name: Bug report
description: Report a reproducible LinGet failure
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not report vulnerabilities here. Use the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: LinGet version
      description: Output of `linget --version`.
      placeholder: linget 0.2.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Distribution, release, architecture, and terminal.
      placeholder: Ubuntu 24.04, x86_64, Kitty
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options: [TUI, CLI, Optional GUI]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the smallest repeatable sequence and redact sensitive values.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted output
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private registry URLs, and sensitive package or path data.
          required: true
