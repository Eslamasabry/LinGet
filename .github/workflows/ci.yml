name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format (check)
        run: cargo fmt --all --check

  stable-provider-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Stable provider contracts
        run: cargo test --no-default-features stable_provider_ -- --nocapture

  cohort-kit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify cohort decisions and documentation contracts
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Dry-run stable-promotion decision
        run: |
          python3 scripts/cohort_report.py tests/fixtures/cohort-scorecard-pass.json > /tmp/cohort-decision.md
          grep -F 'PROMOTE — ALL STABLE-PROMOTION GATES PASSED' /tmp/cohort-decision.md

  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Clippy
        run: cargo clippy --locked --all-targets --no-default-features -- -D warnings

      - name: Tests
        run: cargo test --locked --no-default-features

      - name: Build (release)
        run: cargo build --locked --release --no-default-features

      - name: Smoke terminal artifact
        run: bash scripts/smoke-install.sh
