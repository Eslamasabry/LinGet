[package]
name = "linget-backends"
version = "0.1.0"
edition = "2021"
description = "Shared package backend implementations for LinGet"
authors = ["LinGet Contributors"]
license = "GPL-3.0"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full", "rt-multi-thread", "process", "sync"] }

# Async utilities
async-trait = "0.1"
async-channel = "2"
futures = "0.3"

# Error handling
anyhow = "1"
thiserror = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Shared core types
linget-backend-core = { path = "../backend-core" }

# System utilities
which = "7"
dirs = "5"
regex = "1"
humansize = "2"

# HTTP client
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Semver
semver = "1"

# UUID
uuid = { version = "1", features = ["v4"] }
